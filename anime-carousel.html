<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Auto-Scrolling Carousel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: slideInDown 0.8s ease;
        }

        .carousel-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            animation: slideInUp 0.8s ease;
        }

        .carousel {
            display: flex;
            gap: 20px;
            padding: 10px;
            background: #1a1a2e;
            overflow-x: auto;
            scroll-behavior: smooth;
            width: 100%;
        }

        .carousel::-webkit-scrollbar {
            height: 8px;
        }

        .carousel::-webkit-scrollbar-track {
            background: #333;
            border-radius: 10px;
        }

        .carousel::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .carousel::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        .anime-item {
            flex: 0 0 280px;
            height: 380px;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            background: #2a2a3e;
        }

        .anime-item:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }

        .anime-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .anime-item:hover img {
            transform: scale(1.1);
        }

        .anime-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
            color: white;
            padding: 20px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .anime-item:hover .anime-info {
            transform: translateY(0);
        }

        .anime-info h3 {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .anime-info p {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .scroll-indicator {
            text-align: center;
            color: white;
            font-size: 0.9em;
            margin-top: 15px;
            opacity: 0.7;
        }

        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .anime-item {
                flex: 0 0 200px;
                height: 280px;
            }

            button {
                padding: 8px 16px;
                font-size: 0.9em;
            }
        }

        .status-text {
            text-align: center;
            color: white;
            margin-top: 15px;
            font-size: 0.95em;
        }

        .status-text.paused {
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎌 Anime Gallery</h1>
        
        <div class="carousel-wrapper">
            <div class="carousel" id="carousel">
                <!-- Anime items will be inserted here by JavaScript -->
            </div>
        </div>

        <div class="controls">
            <button id="prevBtn">← Previous</button>
            <button id="playPauseBtn">⏸ Pause</button>
            <button id="nextBtn">Next →</button>
        </div>

        <div class="scroll-indicator">
            💡 Hover over the carousel to pause scrolling
        </div>
        <div class="status-text" id="statusText">Auto-scrolling active...</div>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const prevBtn = document.getElementById('prevBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const nextBtn = document.getElementById('nextBtn');
        const statusText = document.getElementById('statusText');

        // Anime data with image URLs
        const animeData = [
            {
                name: 'Naruto Shippuden',
                genre: 'Action, Adventure',
                image: 'https://via.placeholder.com/280x380?text=Naruto+Shippuden'
            },
            {
                name: 'Attack on Titan',
                genre: 'Action, Dark Fantasy',
                image: 'https://via.placeholder.com/280x380?text=Attack+on+Titan'
            },
            {
                name: 'Death Note',
                genre: 'Psychological, Thriller',
                image: 'https://via.placeholder.com/280x380?text=Death+Note'
            },
            {
                name: 'Demon Slayer',
                genre: 'Action, Supernatural',
                image: 'https://via.placeholder.com/280x380?text=Demon+Slayer'
            },
            {
                name: 'My Hero Academia',
                genre: 'Action, School',
                image: 'https://via.placeholder.com/280x380?text=My+Hero+Academia'
            },
            {
                name: 'Jujutsu Kaisen',
                genre: 'Action, Supernatural',
                image: 'https://via.placeholder.com/280x380?text=Jujutsu+Kaisen'
            },
            {
                name: 'Tokyo Ghoul',
                genre: 'Action, Dark Fantasy',
                image: 'https://via.placeholder.com/280x380?text=Tokyo+Ghoul'
            },
            {
                name: 'Steins;Gate',
                genre: 'Sci-Fi, Thriller',
                image: 'https://via.placeholder.com/280x380?text=Steins+Gate'
            },
            {
                name: 'Code Geass',
                genre: 'Mecha, School',
                image: 'https://via.placeholder.com/280x380?text=Code+Geass'
            },
            {
                name: 'Bleach',
                genre: 'Action, Adventure',
                image: 'https://via.placeholder.com/280x380?text=Bleach'
            }
        ];

        let autoScrollInterval;
        let isAutoScrolling = true;
        let scrollPosition = 0;

        // Populate carousel with anime items
        function populateCarousel() {
            carousel.innerHTML = '';
            animeData.forEach((anime) => {
                const item = document.createElement('div');
                item.className = 'anime-item';
                item.innerHTML = `
                    <img src="${anime.image}" alt="${anime.name}" loading="lazy">
                    <div class="anime-info">
                        <h3>${anime.name}</h3>
                        <p>${anime.genre}</p>
                    </div>
                `;
                carousel.appendChild(item);
            });
        }

        // Auto-scroll function
        function autoScroll() {
            if (isAutoScrolling && !isCarouselHovered) {
                carousel.scrollLeft += 300;
                
                // Reset to beginning when reaching the end
                if (carousel.scrollLeft >= carousel.scrollWidth - carousel.clientWidth - 20) {
                    carousel.scrollLeft = 0;
                }
            }
        }

        // Start auto-scroll
        function startAutoScroll() {
            if (!autoScrollInterval) {
                autoScrollInterval = setInterval(autoScroll, 3000);
                isAutoScrolling = true;
                playPauseBtn.textContent = '⏸ Pause';
                statusText.textContent = 'Auto-scrolling active...';
                statusText.classList.remove('paused');
            }
        }

        // Stop auto-scroll
        function stopAutoScroll() {
            clearInterval(autoScrollInterval);
            autoScrollInterval = null;
            isAutoScrolling = false;
            playPauseBtn.textContent = '▶ Play';
            statusText.textContent = 'Paused';
            statusText.classList.add('paused');
        }

        // Toggle auto-scroll
        function toggleAutoScroll() {
            if (isAutoScrolling) {
                stopAutoScroll();
            } else {
                startAutoScroll();
            }
        }

        // Manual scroll functions
        function scrollPrevious() {
            carousel.scrollLeft -= 300;
        }

        function scrollNext() {
            carousel.scrollLeft += 300;
        }

        // Hover to pause
        let isCarouselHovered = false;
        carousel.addEventListener('mouseenter', () => {
            isCarouselHovered = true;
            statusText.textContent = 'Paused (hovering)...';
            statusText.classList.add('paused');
        });

        carousel.addEventListener('mouseleave', () => {
            isCarouselHovered = false;
            if (isAutoScrolling) {
                statusText.textContent = 'Auto-scrolling active...';
                statusText.classList.remove('paused');
            }
        });

        // Event listeners
        prevBtn.addEventListener('click', scrollPrevious);
        nextBtn.addEventListener('click', scrollNext);
        playPauseBtn.addEventListener('click', toggleAutoScroll);

        // Initialize
        populateCarousel();
        startAutoScroll();
    </script>
</body>
</html>
