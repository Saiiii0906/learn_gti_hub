<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block</title>
    <style>
        .block {
            width: 1200px;
            height: 500px;
            background-color: rgb(255, 5, 5);
            display: flex;
            margin: auto;
            justify-content: space-around;
        }

        .light {
            width: 1150px;
            height: 200px;
            background-color: rgb(248, 247, 247);
            margin-top: 10px;
            margin-left: 20px;
        }

        .inner1 {
            width: 100px;
            height: 100px;
            background-color: rgb(20, 206, 144);
            margin-top: 10px;
            margin-left: 20px;
        }
        
        .inner1:nth-child(2) {
            background-color: rgb(20, 206, 144);
            margin-left: 40px;
            align-items: center;
        }

        .inner1:nth-child(3) {
            background-color: rgb(20, 206, 144);
            margin-left: 60px;
            align-items: center;
        }

        .inner1:nth-child(4) {
            background-color: rgb(20, 206, 144);
            margin-left: 80px;
            align-items: center;
        }


        /* .dark {
            width: 200px;
            height: 200px;
            background-color: rgb(17, 16, 16);
            border-radius: 20px;
        }

        .inbox {
            width: 200px;
            height: 200px;
            background-color: rgb(13, 12, 12);
            border-radius: 20px;
        } */
    </style>

</head>
<body>
    <div class="block">
        <div class="light">
            <div class = "inner1"></div>
            <div class = "inner1"></div>
            <div class = "inner1"></div>
            <div class = "inner1"></div>
        </div>
        <div class="dark"></div>
        <div class="inbox"></div>
    </div>

    
</body>
</html>
