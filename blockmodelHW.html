<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Model Layout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f5f5;
}

.container{
    width:700px;
    padding:30px;
    border:3px solid black;
    display:flex;
    flex-direction:column;
    gap:30px;
}

/* Common row styling */
.row{
    border:2px solid black;
    padding:20px;
    display:flex;
    gap:20px;
    align-items:center;
}

/* Top row */
.small-box{
    width:100px;
    height:70px;
    border:2px solid black;
}

.large-box{
    flex:1;
    height:70px;
    border:2px solid black;
}

/* Middle row */
.middle-box{
    width:100px;
    height:50px;
    border:2px solid black;
}

.circle{
    width:50px;
    height:50px;
    border:2px solid black;
    border-radius:50%;
}

/* Bottom row */
.bottom-large{
    flex:1;
    height:80px;
    border:2px solid black;
}

.bottom-small{
    width:100px;
    height:80px;
    border:2px solid black;
}

</style>
</head>
<body>

<div class="container">

    <!-- Top -->
    <div class="row">
        <div class="small-box"></div>
        <div class="large-box"></div>
    </div>

    <!-- Middle -->
    <div class="row">
        <div class="circle"></div>
        <div class="middle-box"></div>
        <div class="circle"></div>
        <div class="middle-box"></div>
    </div>

    <!-- Bottom -->
    <div class="row">
        <div class="bottom-large"></div>
        <div class="bottom-small"></div>
    </div>

</div>

</body>
</html>
