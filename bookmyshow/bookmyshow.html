<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookMyShow Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">bookMyShow</div>

        <div class="search">
            <input type="text" placeholder="Search Movies, Events...">
        </div>

        <button class="sign-btn">Sign In</button>
    </header>

    <!-- Categories -->
    <section class="categories">
        <div class="category"> Movies</div>
        <div class="category"> Plays</div>
        <div class="category"> Shows</div>
        <div class="category"> Parks</div>
        <div class="category"> Comedy</div>
    </section>

    <!-- Banner -->
    <section class="banner">
        <img src="https://www.behance.net/search/projects/bookmyshow" alt="banner">
    </section>

    <!-- Movies -->
    <section class="movies-section">

        <div class="section-header">
            <h2>Recommended Movies</h2>
            <a href="#">See All</a>
        </div>

        <div class="movies">

            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300" alt="">
                <h3>Spiderman 1</h3>
                <p>9.2</p>
            </div>

            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300" alt="">
                <h3>Spiderman 2</h3>
                <p>8.9</p>
            </div>

            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300" alt="">
                <h3>Spiderman No way home</h3>
                <p>8.5</p>
            </div>

            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300" alt="">
                <h3>Amazing Spiderman</h3>
                <p>9.0</p>
            </div>

        </div>
    </section>

</body>
</html>
