<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Flexbox Navbar</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #131921;
      color: #fff;
      padding: 20px 30px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .navbar-left,
    .navbar-center,
    .navbar-right {
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      color: #fff;
      text-decoration: none;
      font-size: 32px;
      font-weight: 700;
    }

    .logo span {
      color: #ff9900;
      margin-left: 4px;
      font-size: 28px;
    }

    .search {
      display: flex;
      flex: 1;
      max-width: 640px;
      min-width: 240px;
    }

    .search input {
      flex: 1;
      padding: 14px 16px;
      border: none;
      border-radius: 4px 0 0 4px;
      outline: none;
      font-size: 16px;
    }

    .search button {
      padding: 14px 20px;
      border: none;
      background: #febd69;
      color: #111;
      border-radius: 0 4px 4px 0;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      margin-left: 20px;
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      line-height: 1.2;
    }

    .nav-item span:last-child {
      font-size: 16px;
      font-weight: 700;
    }

    .nav-link {
      display: flex;
      align-items: center;
      color: #fff;
      text-decoration: none;
      margin-left: 20px;
      font-size: 16px;
      font-weight: 700;
    }

    /* Profile photo circular box */
    .profile {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      background: #fff;
      display: inline-block;
      margin-left: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .profile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cart {
      display: flex;
      align-items: center;
      margin-left: 20px;
    }

    .cart-count {
      margin-left: 8px;
      font-weight: 700;
    }

    /* Image container below navbar */
    .container {
      /* make container equal to the viewport size */
      width: 100vw;
      min-height: calc(100vh - 80px);
      margin: 0 auto;
      display: flex;
      gap: 20px;
      padding: 30px 20px;
      box-sizing: border-box;
      flex-wrap: wrap;
      justify-content: center;
      background: #e8e8e8;
      border-radius: 0;
    }

    .image-box {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.12);
      width: calc(33.333% - 13.333px);
      min-width: 200px;
      height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    @media (max-width: 860px) {
      .navbar {
        justify-content: center;
      }

      .search {
        width: 100%;
        max-width: 100%;
      }

      .navbar-right {
        width: 100%;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
      }

      .nav-item,
      .nav-link,
      .cart {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <div class="navbar-left">
      <a href="#" class="logo">Amazon<span></span></a>
    </div>
    <div class="navbar-center">
      <div class="search">
        <input type="text" placeholder="Search Amazon" aria-label="Search Amazon">
        <button type="button">Search</button>
      </div>
    </div>
    <div class="navbar-right">
      <a href="#" class="profile" aria-label="Profile">
        <img src="https://static0.cbrimages.com/wordpress/wp-content/uploads/2025/02/10-things-about-goku-you-d-only-know-if-you-read-the-dragon-ball-manga.jpg?w=1200&h=675&fit=crop" alt="Profile">
      </a>
      <a class="nav-item" href="#">
        <span>Hello, Sign in</span>
        <span>Account & Lists</span>
      </a>
      <a class="nav-item" href="#">
        <span>Returns</span>
        <span>& Orders</span>
      </a>
      <a class="nav-link" href="#">Try Prime</a>
      <a class="nav-link cart" href="#">
        <span>Cart</span>
        <span class="cart-count">(0)</span>
      </a>
    </div>
  </header>
  <!-- Image items -->
  <div class="container">
    <div class="image-box">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTk4KLJZP3Un7lcX74vBgrGo6kra5yYwaejAQ&s">
    </div>
    <div class="image-box">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDPQDzaeTyMyDUq13mxW-pCPqiGOUMVNJkwQ&s">
    </div>
    <div class="image-box">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8iVv-SxpwZvHV-NNaZVg4O9F5MjvZlu_wzw&s">
    </div>
  </div>
</body>
</html>
