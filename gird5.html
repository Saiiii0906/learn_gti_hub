<!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#111;
  font-family:Arial;
}

.dashboard{
  width:540px;
  height:520px;
  background:#20105a;
  padding:18px;
  border-radius:20px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:110px 150px 110px;
  gap:12px;
}

.card{
  background:#5b43d6;
  border-radius:14px;
  color:white;
  padding:18px;
  box-sizing:border-box;
}

.apps{
  grid-column:1 / 2;
}

.likes{
  grid-column:2 / 3;
  text-align:center;
}

.views{
  grid-column:3 / 4;
  text-align:center;
}

.users{
  grid-column:1 / 2;
}

.design{
  grid-column:2 / 3;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:24px;
  font-weight:bold;
}

.performance{
  grid-column:3 / 4;
  grid-row:2 / 4;
  background:#dffcff;
  color:#222;
}

.textbox{
  grid-column:1 / 3;
  position:relative;
  overflow:hidden;
}

.circle{
  position:absolute;
  right:-40px;
  bottom:-40px;
  width:150px;
  height:150px;
  background:#7b68ee;
  border-radius:50%;
}

h1{
  font-size:45px;
  margin:15px 0 5px;
}

p{
  margin:0;
  font-size:14px;
}

.icons{
  display:flex;
  gap:12px;
  margin-top:20px;
}

.icon{
  width:35px;
  height:35px;
  border-radius:8px;
  background:#8c7cff;
  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<div class="dashboard">

  <div class="card apps">
    <p>A complete family of Apps</p>
    <div class="icons">
      <div class="icon">▶</div>
      <div class="icon">𝕏</div>
      <div class="icon">♪</div>
    </div>
  </div>

  <div class="card likes">
    <h1>25K</h1>
    <p>Weekly Likes</p>
  </div>

  <div class="card views">
    <h1>50K</h1>
    <p>Weekly Viewers</p>
  </div>

  <div class="card users">
    <p>Active Users</p>
    <h1>1,538</h1>
  </div>

  <div class="card design">
    DESIGN
  </div>

  <div class="card performance">
    <p>Total Performance</p>
    <h1>20K</h1>
  </div>

  <div class="card textbox">
    <h3>A place to learn UI Design & Web Design.</h3>
    <div class="circle"></div>
  </div>

</div>
