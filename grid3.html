<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <style>
                *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, sans-serif;
            display:flex;
            min-height:100vh;
            background:#f5f5f5;
        }

        .container{
            width:800px;
            display:grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 150px 150px 80px;

            gap:10px;
        }

        .box,
        .footer{
            border:2px solid #000;
            display:flex;
            justify-content:center;
            align-items:center;
            background:rgb(202, 240, 32);
        }

        
        .a1{
            grid-column:1;
            grid-row:1;
            background-color: rgb(255, 0, 0);
        }
.b{
            grid-column:2;
            grid-row:1 / 3;
              background-color: rgb(210, 18, 185);
        }

        .c1{
            grid-column:3;
            grid-row:1;
              background-color: rgb(89, 0, 255);
        }

        .a2{
            grid-column:1;
            grid-row:2;
              background-color: rgb(2, 255, 23);
        }

        .c2{
            grid-column:3;
            grid-row:2;
              background-color: rgb(2, 255, 255);
        }

        .footer{
            grid-column:1 / -1;
            grid-row:3
            
        }

      
    </style>
</head>
<body>

    <div class="container">

        <div class="box a1">
        
        </div>

        <div class="box b">
             <br>
        
        </div>

        <div class="box c1">
            
        </div>

        <div class="box a2">
            <div class="circle"></div>
        </div>

        <div class="box c2">
            
        </div>

        <div class="footer">

        </div>

    </div>

</body>
</html>
