<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Road</title>
    <style>

        .Vertical-road {
            width: 100px;
            height: 300px;
            background-color: rgb(17, 16, 16);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            margin: 50px auto;
            padding: 10px;
        }

        .light {
            width: 60px;
            height: 60px;
            background-color: gray;
            border-radius: 50%;
        }

        .strip {
            width: 20px;
            height: 60px;
            background-color: rgb(248, 247, 247);
        }

    </style>
</head>
<body>
    <div class="Vertical-road">
        <div class="strip"></div>
        <div class="strip"></div>
        <div class="strip"></div>
    </div>
</body>
</html>
