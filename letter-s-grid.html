<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter S Grid</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 60px);
            grid-template-rows: repeat(9, 60px);
            gap: 5px;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .box {
            background-color: #3498db;
            border: 1px solid #2980b9;
            border-radius: 4px;
        }

        
        .box:nth-child(1) { grid-column: 1; grid-row: 1; }
        .box:nth-child(2) { grid-column: 2; grid-row: 1; }
        .box:nth-child(3) { grid-column: 3; grid-row: 1; }

        
        .box:nth-child(4) { grid-column: 1; grid-row: 2; }

        
        .box:nth-child(5) { grid-column: 1; grid-row: 3; }

        
        .box:nth-child(6) { grid-column: 2; grid-row: 4; }
        .box:nth-child(7) { grid-column: 3; grid-row: 4; }
        .box:nth-child(8) { grid-column: 4; grid-row: 4; }

       
        .box:nth-child(9) { grid-column: 4; grid-row: 5; }

        
        .box:nth-child(10) { grid-column: 4; grid-row: 6; }

        
        .box:nth-child(11) { grid-column: 2; grid-row: 7; }
        .box:nth-child(12) { grid-column: 3; grid-row: 7; }
        .box:nth-child(13) { grid-column: 4; grid-row: 7; }

        
        .box:nth-child(14) { grid-column: 4; grid-row: 8; }

        
        .box:nth-child(15) { grid-column: 1; grid-row: 9; }
        .box:nth-child(16) { grid-column: 2; grid-row: 9; }
        .box:nth-child(17) { grid-column: 3; grid-row: 9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Letter S Grid</h1>
        <div class="grid">
            <!-- Row 1: positions 1,2,3 -->
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>

            <!-- Row 2: position 1 -->
            <div class="box"></div>

            <!-- Row 3: position 1 -->
            <div class="box"></div>

            <!-- Row 4: positions 2,3,4 -->
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>

            <!-- Row 5: position 4 -->
            <div class="box"></div>

            <!-- Row 6: position 4 -->
            <div class="box"></div>

            <!-- Row 7: positions 2,3,4 -->
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>

            <!-- Row 8: position 4 -->
            <div class="box"></div>

            <!-- Row 9: positions 1,2,3 -->
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>
</body>
</html>
