<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Form</title>

    <style>
        input{
            padding: 5px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <form action="">
        <fieldset>
            <legend>Athlete Information</legend>
            <ul>
                <li>
                    <label for="fname">Name: </label>
                    <input type="text" id="fname" name="fname" placeholder="Enter your name">
                </li>

                <li>
                    <label for="age">Age: </label>
                    <input type="number" id="age" name="age" placeholder="Enter your age">
                </li>

                <li>
                    <label for="sport">Sport: </label>
                    <input type="text" id="sport" name="sport" placeholder="Enter your sport">
                </li>

                <li>
                    <label for="team">Team Name: </label>
                    <input type="text" id="team" name="team" placeholder="Enter your team name">
                </li>
            </ul>
        </fieldset>
    </form>
</body>
</html>
