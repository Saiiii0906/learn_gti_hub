<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube</title>
    <meta name="description" content="This is a youtube navigation bar">
    <style>
        #nav{
            background-color: rgb(245, 241, 6);
            height: 100px;
            width: 1500px;
            border-color: black;
            border-width: 2px;
            border-style: solid;
            text-align: center;
        }
    </style>

</head>
<body>
    <!-- youtube navigation bar -->
    <div id="nav">
        <img src="https://www.freepnglogos.com/uploads/youtube-logo-hd-8.png" alt="youtube logo" height="50px" width="100px" style="float: left; margin-left: 20px; margin-top: 25px;">
        <input type="text" placeholder="Search" style="width: 400px; height: 30px; margin-top: 35px; border-radius: 5px; border: none; padding-left: 10px;">
        <button style="height: 30px; margin-top: 35px; border-radius: 5px; border: none; background-color: red; color: white;">Search</button>
        <img src="https://www.freepnglogos.com/uploads/user-profile-icon-9.png" alt="user profile icon" height="40px" width="40px" style="float: right; margin-right: 20px; margin-top: 25px;">
    </div>

    
</body>
</html>
