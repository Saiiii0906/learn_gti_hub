<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .image{
            width:300px;
            height:500px;
            border-radius:10px;
            border:2px solid black;
            container-type: inline-size;
            overflow:hidden;
        }
        .image img{
            width:100%;
            height:100%;
            object-fit:cover;
        }


    </style>

</head>

    <div class="image">
        <img src="3.jpeg" alt="Image">
    </div>
</body>
</html>
