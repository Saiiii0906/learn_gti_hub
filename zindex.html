<!DOCTYPE html>
<html>
<head>
  <style>
    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#f2f2f2;
    }

    .container{
      position: relative;
      width: 400px;
      height: 250px;
    }

    .box{
      position: absolute;
      width: 80px;
      height: 80px;
      border: 3px solid black;
      background: transparent;
    }

    /* stacking using z-index */
    .box1{
      top: 0;
      left: 0;
      z-index: 5;
    }

    .box2{
      top: 30px;
      left: 50px;
      z-index: 4;
    }

    .box3{
      top: 60px;
      left: 100px;
      z-index: 3;
    }

    .box4{
      top: 90px;
      left: 150px;
      z-index: 2;
    }

    .box5{
      top: 120px;
      left: 200px;
      z-index: 1;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
    <div class="box box5"></div>
  </div>

</body>
</html>
