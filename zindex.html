<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Z-Index Stack</title>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
    }

    .container{
      position:relative;
      width:500px;
      height:300px;
    }

    .box{
      position:absolute;
      width:90px;
      height:90px;
      border:3px solid black;
    }

    /* Box 1 */
    .box1{
      background:red;
      top:0;
      left:0;
      z-index:5;
    }

    /* Box 2 */
    .box2{
      background:blue;
      top:35px;
      left:55px;
      z-index:4;
    }

    /* Box 3 */
    .box3{
      background:green;
      top:70px;
      left:110px;
      z-index:3;
    }

    /* Box 4 */
    .box4{
      background:orange;
      top:105px;
      left:165px;
      z-index:2;
    }

    /* Box 5 */
    .box5{
      background:purple;
      top:140px;
      left:220px;
      z-index:1;
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="box box1"></div>

    <div class="box box2"></div>

    <div class="box box3"></div>

    <div class="box box4"></div>

    <div class="box box5"></div>

  </div>

</body>
</html>
