<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z-index Design</title>

  <style>

    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f2f2f2;
    }

    .container{
      position:relative;
      width:400px;
      height:400px;
    }

    .box{
      position:absolute;
      width:120px;
      height:120px;
      border:2px solid rgb(13, 13, 14);
      background:transparent;
    }

    /* Top Box */
    .box1{
      top:20px;
      left:130px;
      z-index:4;
      background:rgba(255, 0, 0, 0.5);
    }

    /* Left Box */
    .box2{
      top:100px;
      left:40px;
      z-index:2;
      background:rgba(15, 168, 92, 0.5);
    }

    /* Right Box */
    .box3{
      top:100px;
      left:220px;
      z-index:3;
      background:rgba(217, 255, 1, 0.5);
    }

    /* Bottom Box */
    .box4{
      top:200px;
      left:130px;
      z-index:1;
        background:rgba(0, 0, 255, 0.5);
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="box box1"></div>

    <div class="box box2"></div>

    <div class="box box3"></div>

    <div class="box box4"></div>

  </div>

</body>
</html>
